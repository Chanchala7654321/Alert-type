<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title> Alert Demo</title>
    <link rel="stylesheet" href="./style.css">
    <!-- SweetAlert2 CDN -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

</head>

<body>

    <h1> Alert Examples</h1>

    <button class="success" onclick="successAlert()">Success</button>
    <button class="error" onclick="errorAlert()">Error</button>
    <button class="warning" onclick="warningAlert()">Warning</button>
    <button class="info" onclick="infoAlert()">Info</button>
    <button class="confirm" onclick="confirmAlert()">Confirm</button>
    <button class="login" onclick="loginAlert()">Login Success</button>
    <button class="delete" onclick="deleteAlert()">Delete</button>
    <button class="timer" onclick="timerAlert()">Timer</button>
    <button class="toast" onclick="toastAlert()">Toast</button>
    <button class="loading" onclick="loadingAlert()">Loading</button>

    <script src="./script.js"></script>

</body>

</html>
